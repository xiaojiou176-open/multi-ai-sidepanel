name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
template: |
  ## Prompt Switchboard

  This release keeps the public front door aligned with the product itself:

  - compare-first browser workflow
  - local-first trust boundary
  - supported AI chat surfaces and selector resilience

  ### Install
  - download the packaged extension bundle from this release
  - unzip it locally
  - load the extracted folder in `chrome://extensions`

  ### Highlights
  $CHANGES

version-resolver:
  major:
    labels:
      - major
      - breaking-change
  minor:
    labels:
      - feature
      - ux
      - product
      - marketing
  patch:
    labels:
      - fix
      - docs
      - test
      - security
      - chore
      - dependencies
  default: patch

categories:
  - title: Product
    labels:
      - feature
      - ux
      - product
  - title: Front Door
    labels:
      - docs
      - marketing
      - branding
  - title: Verification
    labels:
      - test
      - ci
      - security
  - title: Maintenance
    labels:
      - chore
      - dependencies
