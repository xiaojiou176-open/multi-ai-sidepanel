name: Nightly Repo Audits

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install pre-commit
        run: uv tool install pre-commit==4.5.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install Gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Install git-secrets
        run: |
          tmp_dir="$(mktemp -d)"
          curl -sSL https://codeload.github.com/awslabs/git-secrets/tar.gz/refs/tags/1.3.0 -o "$tmp_dir/git-secrets.tar.gz"
          tar -xzf "$tmp_dir/git-secrets.tar.gz" -C "$tmp_dir"
          sudo make -C "$tmp_dir/git-secrets-1.3.0" install

      - name: Install dependencies
        run: npm ci

      - name: Setup git-secrets rules
        run: npm run secrets:setup

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Nightly repo audit pack
        run: npm run test:nightly
