name: Bug report
description: Report a reproducible non-sensitive problem.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, cookies, private keys, or personal data in public issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest repeatable steps.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and platform
      placeholder: Chrome version, OS, and any relevant setup detail
  - type: input
    id: site
    attributes:
      label: Supported site
      placeholder: ChatGPT, Gemini, Perplexity, Qwen, Grok, or not site-specific
